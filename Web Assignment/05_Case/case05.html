<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Case_05</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
    <link rel="stylesheet" href="../assets/lib/normalize.css">
    <link rel="stylesheet" href="https://www.hxstrive.com/cdn/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        body{
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .slider-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .slider-wrapper {
            display: flex;
            width: 400%;
            height: 100%;
            animation-name: slide;
            animation-iteration-count: infinite;
            animation-duration: 10000ms;
            animation-direction: alternate-reverse;
        }

        .slider-wrapper img {
            width: 100vw;
            height: 100vh;
        }


        @keyframes slide {
            0% { transform: translateX(0); }
            20% { transform: translateX(0); }
            25% { transform: translateX(-25%); }
            45% { transform: translateX(-25%); }
            50% { transform: translateX(-50%); }
            70% { transform: translateX(-50%); }
            75% { transform: translateX(-75%); }
            95% { transform: translateX(-75%); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="slider-container">
        <div class="slider-wrapper">
            <img src="../assets/865178.jpg" alt="Img 1">
            <img src="../assets/Free-Download-HD-Nature-Wallpapers-Desktop.jpg" alt="Img 2">
            <img src="../assets/images.jpg" alt="Img 3">
            <img src="../assets/stunning-high-resolution-nature-and-landscape-backgrounds-breathtaking-scenery-in-hd-photo.jpg" alt="Img 4">
        </div>
    </div>
</body>
</html>
